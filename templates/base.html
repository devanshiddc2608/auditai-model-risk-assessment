<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AuditAI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark auditai-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">AuditAI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/audit">Audit Tool</a></li>
        <li class="nav-item"><a class="nav-link" href="/risk-assessment">Risk Narrative</a></li>
        <li class="nav-item"><a class="nav-link" href="/audit-report">Full Report</a></li>
        <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="https://github.com/devanshiddc2608" target="_blank">GitHub</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
    {% block content %}{% endblock %}
</main>

<footer class="auditai-footer text-center py-4">
    <p class="mb-1">Built by Devanshi | 
        <a href="https://www.linkedin.com/" target="_blank">LinkedIn</a> | 
        <a href="https://github.com/devanshiddc2608" target="_blank">GitHub</a>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
